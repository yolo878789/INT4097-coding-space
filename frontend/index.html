<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>同义词大师 - 每日挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .game-section, .auth-section, .leaderboard-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1, h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .word-display {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .target-word {
            font-size: 2.5em;
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .question-number {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .guess-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .guess-input {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        .guess-input:focus {
            border-color: #667eea;
        }

        .guess-btn, .control-btn, .hint-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .guess-btn:hover, .control-btn:hover, .hint-btn:hover {
            transform: translateY(-2px);
        }

        .hint-btn {
            background: linear-gradient(135deg, #ff9800 0%, #ff5722 100%);
        }

        .new-game-btn {
            background: #28a745;
        }

        .logout-btn {
            background: #dc3545;
        }

        .score-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }

        .timer-display {
            text-align: center;
            font-size: 1.5em;
            margin: 15px 0;
            padding: 10px;
            background: #f0f0ff;
            border-radius: 10px;
        }

        .timer-value {
            font-weight: bold;
            color: #ff6b6b;
            font-size: 1.3em;
        }

        .timer-warning {
            color: #ff0000;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .guesses-history {
            margin-top: 30px;
            max-height: 400px;
            overflow-y: auto;
        }

        .guess-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .correct {
            background: #d4edda;
            color: #155724;
        }

        .wrong {
            background: #f8d7da;
            color: #721c24;
        }

        .perfect {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #155724;
            font-weight: bold;
        }

        .hint-item {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ff9800;
        }

        .auth-form {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .auth-form input {
            padding: 12px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 8px;
            flex: 1;
            min-width: 200px;
        }

        .leaderboard-list {
            list-style: none;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-item.highlight {
            background: #f0f0ff;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }

        .user-info {
            text-align: center;
        }

        .game-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .reset-btn {
            background: #ff6b6b;
        }

        .hint-usage {
            font-size: 0.8em;
            color: #ff9800;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .target-word {
                font-size: 1.5em;
            }
            .guess-input-group {
                flex-direction: column;
            }
            .game-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 用户认证区域 -->
        <div class="auth-section" id="authSection">
            <div id="loginForm">
                <h2>🎯 歡迎來到同義詞大師！</h2>
                <p>每日挑戰 - 速度越快，分數越高！</p>
                <div class="auth-form">
                    <input type="text" id="username" placeholder="使用者名稱" required>
                    <input type="email" id="email" placeholder="信箱" required>
                    <button class="guess-btn" onclick="loginOrRegister()">開始遊戲</button>
                </div>
                <div id="authMessage"></div>
            </div>
            <div id="userInfo" style="display: none;">
                <div class="user-info">
                    <h3>👋 歡迎, <span id="displayUsername"></span>！</h3>
                    <button class="control-btn logout-btn" onclick="logout()">退出登錄</button>
                </div>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="game-section" id="gameSection" style="display: none;">
            <h1>📖 每日同義詞挑戰</h1>
            <p class="subtitle">每日5題 - 限時90秒，速度越快分數越高！</p>
            
            <div class="score-stats">
                <div class="stat">
                    <div class="stat-value" id="todayScore">0</div>
                    <div class="stat-label">今日總分</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="questionsCompleted">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalScore">0</div>
                    <div class="stat-label">累積總分</div>
                </div>
            </div>
            
            <div class="timer-display">
                ⏱️ 剩餘時間: <span class="timer-value" id="gameTimer">90.00</span> 秒
                <div class="hint-usage" id="hintUsage">💡 提示次數: <span id="hintCount">3</span> / 3</div>
            </div>
            
            <div class="word-display">
                <div class="question-number" id="questionNumber">第 1 / 5 題</div>
                <div class="target-label">🎯 找出這個詞的同義詞</div>
                <div class="target-word" id="targetWord">加載中...</div>
                <div class="hint" id="hint" style="margin-top: 10px; color: #666;">💡 提示：這題有 <span id="answerCount">0</span> 個正確答案</div>
            </div>
            
            <div class="guess-area">
                <div class="guess-input-group">
                    <input type="text" id="guessInput" class="guess-input" placeholder="輸入你的猜測..." onkeypress="handleKeyPress(event)">
                    <button class="guess-btn" id="guessBtn" onclick="submitGuess()">猜一猜</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="hint-btn" onclick="getHint()" style="flex: 1;">💡 獲取提示</button>
                </div>
            </div>
            
            <div class="guesses-history">
                <div class="guesses-title" style="font-weight: bold; margin-bottom: 15px;">📝 猜測歷史</div>
                <div id="guessesList"></div>
            </div>
            
            <!--<div class="game-controls">
                <button class="control-btn reset-btn" onclick="resetTodayGame()">🔄 重置今日進度</button>
            </div>-->
        </div>

        <!-- 今日最高分排行榜 -->
        <div class="leaderboard-section">
            <h2>🏆 今日最高分 🏆</h2>
            <div id="todayLeaderboard">
                <div class="loading">加載排行榜中...</div>
            </div>
        </div>
    </div>

    <script>
        // API配置
        const API_URL = 'http://localhost:3000/api';
        
        // 每日问题词库
        const allQuestions = [
            { word: 'happy', synonyms: ['joyful', 'glad', 'cheerful', 'delighted'], maxAnswers: 4 },
            { word: 'big', synonyms: ['large', 'huge', 'enormous', 'gigantic'], maxAnswers: 4 },
            { word: 'fast', synonyms: ['quick', 'speedy', 'rapid'], maxAnswers: 3 },
            { word: 'smart', synonyms: ['intelligent', 'clever', 'bright'], maxAnswers: 3 },
            { word: 'beautiful', synonyms: ['pretty', 'lovely', 'gorgeous'], maxAnswers: 3 },
            { word: 'strong', synonyms: ['powerful', 'sturdy', 'tough'], maxAnswers: 3 },
            { word: 'difficult', synonyms: ['hard', 'challenging', 'tough'], maxAnswers: 3 },
            { word: 'important', synonyms: ['significant', 'crucial', 'vital'], maxAnswers: 3 },
            { word: 'begin', synonyms: ['start', 'commence', 'initiate'], maxAnswers: 3 },
            { word: 'end', synonyms: ['finish', 'complete', 'conclude'], maxAnswers: 3 }
        ];
        
        // 游戏状态
        let currentUser = null;
        let todayQuestions = [];
        let currentQuestionIndex = 0;
        let currentQuestion = null;
        let currentSynonyms = [];
        let guesses = [];
        let questionStartTime = null;
        let gameTimerInterval = null;
        let questionTimerInterval = null;
        let gameTimeLeft = 90;
        let todayScore = 0;
        let totalScore = 0;
        let gameActive = true;
        let hintCount = 3;
        let hintsUsed = 0;
        
        // 获取今天的日期字符串
        function getTodayDate() {
            const today = new Date();
            return `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
        }
        
        // 初始化今日问题
        function initTodayQuestions() {
            const shuffled = [...allQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const selected = shuffled.slice(0, 5);
            
            todayQuestions = selected.map(q => {
                const answerCount = Math.floor(Math.random() * 3) + 1;
                const shuffledSynonyms = [...q.synonyms];
                for (let i = shuffledSynonyms.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledSynonyms[i], shuffledSynonyms[j]] = [shuffledSynonyms[j], shuffledSynonyms[i]];
                }
                const selectedSynonyms = shuffledSynonyms.slice(0, answerCount);
                
                return {
                    word: q.word,
                    synonyms: selectedSynonyms,
                    allSynonyms: q.synonyms,
                    answerCount: answerCount
                };
            });
            
            console.log('今日問題:', todayQuestions);
        }
        
        // 加载今日进度
        function loadTodayProgress() {
            const today = getTodayDate();
            const saved = localStorage.getItem(`gameProgress_${today}_${currentUser.id}`);
            if (saved) {
                const progress = JSON.parse(saved);
                todayQuestions = progress.todayQuestions;
                currentQuestionIndex = progress.currentQuestionIndex;
                todayScore = progress.todayScore;
                hintsUsed = progress.hintsUsed || 0;
                hintCount = 3 - hintsUsed;
                document.getElementById('hintCount').textContent = hintCount;
                console.log('加载今日进度:', progress);
            } else {
                initTodayQuestions();
                currentQuestionIndex = 0;
                todayScore = 0;
                hintsUsed = 0;
                hintCount = 3;
                document.getElementById('hintCount').textContent = hintCount;
            }
            startGameTimer();
            loadCurrentQuestion();
        }
        
        // 保存今日进度
        function saveTodayProgress() {
            const today = getTodayDate();
            const progress = {
                todayQuestions: todayQuestions,
                currentQuestionIndex: currentQuestionIndex,
                todayScore: todayScore,
                hintsUsed: hintsUsed,
                date: today
            };
            localStorage.setItem(`gameProgress_${today}_${currentUser.id}`, JSON.stringify(progress));
        }
        
        // 开始游戏计时器
        function startGameTimer() {
            if (gameTimerInterval) {
                clearInterval(gameTimerInterval);
            }
            
            gameTimerInterval = setInterval(() => {
                if (gameActive && gameTimeLeft > 0) {
                    gameTimeLeft -= 0.1;
                    const timerElement = document.getElementById('gameTimer');
                    if (timerElement) {
                        timerElement.textContent = gameTimeLeft.toFixed(2);
                        
                        // 最后10秒警告效果
                        if (gameTimeLeft <= 10) {
                            timerElement.classList.add('timer-warning');
                        } else {
                            timerElement.classList.remove('timer-warning');
                        }
                    }
                    
                    if (gameTimeLeft <= 0) {
                        endGameDueToTimeout();
                    }
                }
            }, 100);
        }
        
        // 时间到结束游戏
        async function endGameDueToTimeout() {
            gameActive = false;
            if (gameTimerInterval) clearInterval(gameTimerInterval);
            if (questionTimerInterval) clearInterval(questionTimerInterval);
            
            const guessInput = document.getElementById('guessInput');
            const guessBtn = document.getElementById('guessBtn');
            if (guessInput) guessInput.disabled = true;
            if (guessBtn) guessBtn.disabled = true;
            
            alert(`⏰ 時間到！\n今日總分: ${todayScore} 分\n明天再來挑戰吧！`);
            
            // 保存今日分数
            await saveTodayScoreToDatabase();
        }
        
        // 获取提示
        function getHint() {
            if (hintCount <= 0) {
                alert('今日提示次數已用完！明天再來吧！');
                return;
            }
            
            if (!gameActive) {
                alert('遊戲已結束！');
                return;
            }
            
            if (currentSynonyms.length === 0) {
                alert('已經猜完所有答案了！');
                return;
            }
            
            // 随机选择一个未猜出的同义词作为提示
            const remainingSynonyms = currentSynonyms;
            const randomHint = remainingSynonyms[Math.floor(Math.random() * remainingSynonyms.length)];
            
            hintCount--;
            hintsUsed++;
            document.getElementById('hintCount').textContent = hintCount;
            saveTodayProgress();
            
            // 显示提示
            const hintDiv = document.createElement('div');
            hintDiv.className = 'guess-item hint-item';
            hintDiv.innerHTML = `
                <span>💡 提示</span>
                <span>其中一個答案是: "${randomHint}"</span>
            `;
            const guessesList = document.getElementById('guessesList');
            if (guessesList) {
                guessesList.appendChild(hintDiv);
                hintDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
        
        // 加载当前问题
        function loadCurrentQuestion() {
            if (currentQuestionIndex >= todayQuestions.length) {
                endGameComplete();
                return;
            }
            
            currentQuestion = todayQuestions[currentQuestionIndex];
            currentSynonyms = [...currentQuestion.synonyms];
            guesses = [];
            gameActive = true;
            
            // 重置问题计时器
            if (questionTimerInterval) {
                clearInterval(questionTimerInterval);
            }
            questionStartTime = Date.now();
            
            // 更新UI
            const questionNumber = document.getElementById('questionNumber');
            const targetWord = document.getElementById('targetWord');
            const answerCount = document.getElementById('answerCount');
            const guessInput = document.getElementById('guessInput');
            const guessBtn = document.getElementById('guessBtn');
            
            if (questionNumber) questionNumber.textContent = `第 ${currentQuestionIndex + 1} / ${todayQuestions.length} 題`;
            if (targetWord) targetWord.textContent = currentQuestion.word;
            if (answerCount) answerCount.textContent = currentQuestion.answerCount;
            if (guessInput) {
                guessInput.disabled = false;
                guessInput.value = '';
                guessInput.focus();
            }
            if (guessBtn) guessBtn.disabled = false;
            updateGuessesList();
            
            console.log('當前問題:', currentQuestion);
        }
        
        // 完成所有题目
        async function endGameComplete() {
            gameActive = false;
            if (gameTimerInterval) clearInterval(gameTimerInterval);
            if (questionTimerInterval) clearInterval(questionTimerInterval);
            
            const guessInput = document.getElementById('guessInput');
            const guessBtn = document.getElementById('guessBtn');
            if (guessInput) guessInput.disabled = true;
            if (guessBtn) guessBtn.disabled = true;
            
            alert(`🎉 恭喜完成今日所有挑戰！\n用時: ${(90 - gameTimeLeft).toFixed(1)}秒\n今日總分: ${todayScore} 分\n明天再來挑戰吧！`);
            
            await saveTodayScoreToDatabase();
        }
        
        // 提交猜测
        async function submitGuess() {
            if (!gameActive) {
                alert('遊戲已結束！');
                return;
            }
            
            if (gameTimeLeft <= 0) {
                alert('時間已用盡！');
                return;
            }
            
            const guessInput = document.getElementById('guessInput');
            if (!guessInput) return;
            
            const guess = guessInput.value.trim().toLowerCase();
            if (!guess) {
                alert('請輸入一個單詞！');
                return;
            }
            
            // 检查是否已经猜过
            if (guesses.some(g => g.word === guess)) {
                alert('你已經猜過這個詞了！');
                guessInput.value = '';
                return;
            }
            
            // 检查是否正确
            const isCorrect = currentSynonyms.includes(guess);
            
            if (isCorrect) {
                // 计算得分
                const elapsed = (Date.now() - questionStartTime) / 1000;
                const timeBonus = Math.max(0, Math.floor(30 - elapsed));
                const points = 10 + timeBonus;
                
                todayScore += points;
                
                // 从剩余同义词中移除
                currentSynonyms = currentSynonyms.filter(s => s !== guess);
                
                const feedback = `✓ 正確！ +${points}分 (用時 ${elapsed.toFixed(1)}秒)`;
                const resultClass = 'correct';
                
                // 保存猜测
                guesses.push({
                    word: guess,
                    correct: true,
                    feedback: feedback,
                    class: resultClass,
                    points: points
                });
                
                // 更新UI
                updateGuessesList();
                guessInput.value = '';
                updateScoreDisplay();
                saveTodayProgress();
                
                // 检查是否猜出了所有同义词
                if (currentSynonyms.length === 0) {
                    await nextQuestion();
                }
            } else {
                // 错误猜测
                const feedback = '✗ 錯誤，再試試看！';
                guesses.push({
                    word: guess,
                    correct: false,
                    feedback: feedback,
                    class: 'wrong'
                });
                updateGuessesList();
                guessInput.value = '';
            }
        }
        
        // 下一题
        async function nextQuestion() {
            gameActive = false;
            
            // 显示正确答案
            const correctAnswersDiv = document.createElement('div');
            correctAnswersDiv.className = 'guess-item perfect';
            correctAnswersDiv.innerHTML = `
                <span>✨ 本題正確答案</span>
                <span>${currentQuestion.synonyms.join(', ')}</span>
            `;
            const guessesList = document.getElementById('guessesList');
            if (guessesList) guessesList.appendChild(correctAnswersDiv);
            
            // 移动到下一题
            currentQuestionIndex++;
            saveTodayProgress();
            
            // 检查是否完成所有题目
            if (currentQuestionIndex >= todayQuestions.length) {
                await endGameComplete();
            } else {
                // 加载下一题
                setTimeout(() => {
                    loadCurrentQuestion();
                }, 1000);
            }
        }
        
        // 保存今日分数到数据库
        async function saveTodayScoreToDatabase() {
            try {
                const today = getTodayDate();
                await fetch(`${API_URL}/users/${currentUser.id}/score`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ score: todayScore })
                });
                
                // 更新游戏次数
                await fetch(`${API_URL}/users/${currentUser.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        'Games Played': (parseInt(currentUser['Games Played']) || 0) + 1
                    })
                });
                
                // 刷新用户数据
                const userResponse = await fetch(`${API_URL}/users/${currentUser.id}`);
                currentUser = await userResponse.json();
                localStorage.setItem('gameUser', JSON.stringify(currentUser));
                
                totalScore = parseInt(currentUser['Total Score']) || 0;
                updateScoreDisplay();
                loadTodayLeaderboard();
                
            } catch (error) {
                console.error('保存分数失败:', error);
            }
        }
        
        // 重置今日游戏
        function resetTodayGame() {
            if (confirm('確定要重置今日進度嗎？所有今日得分將被清除！')) {
                const today = getTodayDate();
                localStorage.removeItem(`gameProgress_${today}_${currentUser.id}`);
                initTodayQuestions();
                currentQuestionIndex = 0;
                todayScore = 0;
                hintsUsed = 0;
                hintCount = 3;
                gameTimeLeft = 90;
                const hintCountElem = document.getElementById('hintCount');
                const gameTimerElem = document.getElementById('gameTimer');
                if (hintCountElem) hintCountElem.textContent = hintCount;
                if (gameTimerElem) {
                    gameTimerElem.textContent = '90.00';
                    gameTimerElem.classList.remove('timer-warning');
                }
                
                if (gameTimerInterval) clearInterval(gameTimerInterval);
                if (questionTimerInterval) clearInterval(questionTimerInterval);
                
                startGameTimer();
                loadCurrentQuestion();
                updateScoreDisplay();
                saveTodayProgress();
            }
        }
        
        // 更新分数显示
        function updateScoreDisplay() {
            const todayScoreElem = document.getElementById('todayScore');
            const questionsCompletedElem = document.getElementById('questionsCompleted');
            const totalScoreElem = document.getElementById('totalScore');
            
            if (todayScoreElem) todayScoreElem.textContent = todayScore;
            if (questionsCompletedElem) questionsCompletedElem.textContent = `${currentQuestionIndex} / ${todayQuestions.length}`;
            if (totalScoreElem) totalScoreElem.textContent = totalScore;
        }
        
        // 更新猜测列表
        function updateGuessesList() {
            const guessesList = document.getElementById('guessesList');
            if (!guessesList) return;
            
            guessesList.innerHTML = '';
            
            guesses.forEach((guess) => {
                const guessDiv = document.createElement('div');
                guessDiv.className = `guess-item ${guess.class}`;
                guessDiv.innerHTML = `
                    <span class="guess-word">${guess.word}</span>
                    <span class="guess-feedback">${guess.feedback}</span>
                `;
                guessesList.appendChild(guessDiv);
            });
        }
        
        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitGuess();
            }
        }
        
        // 加载今日排行榜
        async function loadTodayLeaderboard() {
            try {
                const today = getTodayDate();
                const response = await fetch(`${API_URL}/users`);
                const data = await response.json();
                const users = data.results || data;
                
                const todayScores = [];
                for (const user of users) {
                    const saved = localStorage.getItem(`gameProgress_${today}_${user.id}`);
                    if (saved) {
                        const progress = JSON.parse(saved);
                        todayScores.push({
                            username: user.Username,
                            score: progress.todayScore,
                            id: user.id
                        });
                    } else {
                        todayScores.push({
                            username: user.Username,
                            score: 0,
                            id: user.id
                        });
                    }
                }
                
                todayScores.sort((a, b) => b.score - a.score);
                const top10 = todayScores.slice(0, 10);
                
                const leaderboardDiv = document.getElementById('todayLeaderboard');
                if (!leaderboardDiv) return;
                
                if (top10.length === 0 || top10.every(s => s.score === 0)) {
                    leaderboardDiv.innerHTML = '<div class="loading">今日暫無得分，快來成為第一名！</div>';
                    return;
                }
                
                let html = '<ul class="leaderboard-list">';
                top10.forEach((player, index) => {
                    const isCurrentUser = currentUser && player.id === currentUser.id;
                    html += `
                        <li class="leaderboard-item ${isCurrentUser ? 'highlight' : ''}">
                            <span style="font-weight: bold;">#${index + 1}</span>
                            <span>${escapeHtml(player.username)}</span>
                            <span style="color: #667eea; font-weight: bold;">${player.score} 分</span>
                        </li>
                    `;
                });
                html += '</ul>';
                
                leaderboardDiv.innerHTML = html;
                
            } catch (error) {
                console.error('加载排行榜失败:', error);
            }
        }
        
        // 用户登录或注册
        async function loginOrRegister() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            
            if (!username || !email) {
                showMessage('authMessage', '請填寫使用者名稱和信箱！', 'error');
                return;
            }
            
            showMessage('authMessage', '處理中...', 'success');
            
            try {
                const response = await fetch(`${API_URL}/users`);
                const data = await response.json();
                const users = data.results || data;
                
                let existingUser = users.find(u => u.Username === username || u.Email === email);
                
                let user;
                if (existingUser) {
                    user = existingUser;
                    showMessage('authMessage', `歡迎回來，${username}！`, 'success');
                } else {
                    const createResponse = await fetch(`${API_URL}/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            Username: username, 
                            Email: email, 
                            'Total Score': 0,
                            'Games Played': 0,
                            'Correct Guesses': 0
                        })
                    });
                    user = await createResponse.json();
                    showMessage('authMessage', `歡迎新玩家，${username}！`, 'success');
                }
                
                currentUser = user;
                totalScore = parseInt(currentUser['Total Score']) || 0;
                localStorage.setItem('gameUser', JSON.stringify(user));
                showGameInterface();
                loadTodayLeaderboard();
                
            } catch (error) {
                console.error('登录错误:', error);
                showMessage('authMessage', `登錄失敗: ${error.message}`, 'error');
            }
        }
        
        // 显示游戏界面
        function showGameInterface() {
            const loginForm = document.getElementById('loginForm');
            const userInfo = document.getElementById('userInfo');
            const gameSection = document.getElementById('gameSection');
            const displayUsername = document.getElementById('displayUsername');
            
            if (loginForm) loginForm.style.display = 'none';
            if (userInfo) userInfo.style.display = 'block';
            if (displayUsername) displayUsername.textContent = currentUser.Username;
            if (gameSection) gameSection.style.display = 'block';
            
            loadTodayProgress();
            updateScoreDisplay();
            loadTodayLeaderboard();
        }
        
        // 退出登录
        function logout() {
            if (gameTimerInterval) clearInterval(gameTimerInterval);
            if (questionTimerInterval) clearInterval(questionTimerInterval);
            
            currentUser = null;
            localStorage.removeItem('gameUser');
            
            const loginForm = document.getElementById('loginForm');
            const userInfo = document.getElementById('userInfo');
            const gameSection = document.getElementById('gameSection');
            const username = document.getElementById('username');
            const email = document.getElementById('email');
            
            if (loginForm) loginForm.style.display = 'block';
            if (userInfo) userInfo.style.display = 'none';
            if (gameSection) gameSection.style.display = 'none';
            if (username) username.value = '';
            if (email) email.value = '';
        }
        
        // 显示消息
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${message}</div>`;
                setTimeout(() => {
                    element.innerHTML = '';
                }, 3000);
            }
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('页面加载完成');
            loadTodayLeaderboard();
            checkSavedUser();
        });
        
        // 检查保存的用户
        function checkSavedUser() {
            const savedUser = localStorage.getItem('gameUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    totalScore = parseInt(currentUser['Total Score']) || 0;
                    showGameInterface();
                } catch (e) {
                    console.error('解析用户数据失败:', e);
                    localStorage.removeItem('gameUser');
                }
            }
        }
        
        // 每30秒刷新排行榜
        setInterval(() => {
            if (currentUser) {
                loadTodayLeaderboard();
            }
        }, 30000);
    </script>
</body>
</html>
